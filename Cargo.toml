[package]
name         = "persona-signal"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/persona-signal"
description  = "Persona binary wire contract."
publish      = false

[lib]
name = "persona_signal"
path = "src/lib.rs"

[dependencies]
rkyv = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror = "2"

[lints.rust]
unsafe_code = "forbid"
unused = "warn"
dead_code = "warn"

